# ─── QuantDesk Redis Configuration ────────────────────────────────────────────

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# Persistence — Append-Only File (WAL)
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""

# Network
tcp-keepalive 300
timeout 0

# Slow log (queries taking longer than 10ms)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Keyspace notifications (for expiry events, useful for session cleanup)
notify-keyspace-events "Ex"
